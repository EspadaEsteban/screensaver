<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <style>
        html,
        body {
            background: #000;
            color: #fff;
            height: 100%;
            margin: 0;
            min-height: 100%;
            overflow: hidden;
            position: relative;
        }

        .marquee {
            display: block;
            left: 0;
            position: absolute;
            top: 0;
            border: 1px solid;
            padding: 20px;
        }

        svg {
            display: block;
        }

        .logo {
            fill: #fff;
        }
    </style>
    <script>
        (function ($, window, undefined) {
            $.fn.marqueeify = function (options) {
                var settings = $.extend({
                    horizontal: true,
                    vertical: true,
                    speed: 100, // In pixels per second
                    container: $(this).parent(),
                    bumpEdge: function () { }
                }, options);

                return this.each(function () {
                    var containerWidth, containerHeight, elWidth, elHeight, move, getSizes,
                        $el = $(this);

                    getSizes = function () {
                        containerWidth = settings.container.outerWidth();
                        containerHeight = settings.container.outerHeight();
                        elWidth = $el.outerWidth();
                        elHeight = $el.outerHeight();

                    };

                    move = {
                        right: function () {
                            $el.animate({
                                left: (containerWidth - elWidth)
                            }, {
                                duration: ((containerWidth / settings.speed) * 1000),
                                queue: false,
                                easing: "linear",
                                complete: function () {
                                    settings.bumpEdge();
                                    move.left();
                                }
                            });
                        },
                        left: function () {
                            $el.animate({
                                left: 0
                            }, {
                                duration: ((containerWidth / settings.speed) * 1000),
                                queue: false,
                                easing: "linear",
                                complete: function () {
                                    settings.bumpEdge();
                                    move.right();
                                }
                            });
                        },
                        down: function () {
                            $el.animate({
                                top: (containerHeight - elHeight)
                            }, {
                                duration: ((containerHeight / settings.speed) * 1000),
                                queue: false,
                                easing: "linear",
                                complete: function () {
                                    settings.bumpEdge();
                                    move.up();
                                }
                            });
                        },
                        up: function () {
                            $el.animate({
                                top: 0
                            }, {
                                duration: ((containerHeight / settings.speed) * 1000),
                                queue: false,
                                easing: "linear",
                                complete: function () {
                                    settings.bumpEdge();
                                    move.down();
                                }
                            });
                        }
                    };
                    getSizes();
                    if (settings.horizontal) {
                        move.right();
                    }
                    if (settings.vertical) {
                        move.down();
                    }

                    // Make that shit responsive!
                    $(window).resize(function () {
                        getSizes();
                    });
                });
            };
        })(jQuery, window);

        $(document).ready(function () {

            $('.marquee').marqueeify({
                speed: 300,
                bumpEdge: function () {
                    let ele = $('.marquee')
                    var newColor = "hsl(" + Math.floor(Math.random() * 360) + ", 100%, 50%)";
                    var newFrameColor = "hsl(" + Math.floor(Math.random() * 360) + ", 100%, 50%)";
                    $('.marquee .logo').css('fill', newColor);
                    $('.marquee').css('border-color', newFrameColor);
                }
            });
        });
    </script>
    <title>Document</title>
</head>

<body>
    <div class="marquee">
        <img src="https://s.yimg.com/ny/api/res/1.2/AR82kLNYOnLzS63.OmrnHA--/YXBwaWQ9aGlnaGxhbmRlcjt3PTE2MDA7aD05MDA7Y2Y9d2VicA--/https://media.zenfs.com/en/know_your_meme_909/b8ead40256a043cbfc490df4e4746376"/>
    </div>
</body>

</html>
